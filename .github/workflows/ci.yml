name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    name: Build & test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake g++ ninja-build libsdl2-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # Also compile the standalone player (engine + SDL2, no ImGui) so player
      # regressions are caught — the default build leaves it off.
      - name: Build player runtime
        run: |
          cmake -S . -B build-player -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DOKAY_BUILD_PLAYER=ON -DOKAY_BUILD_TESTS=OFF \
            -DOKAY_BUILD_SANDBOX=OFF -DOKAY_BUILD_LAUNCHER=OFF
          cmake --build build-player -j

      # Build the editor (Dear ImGui + SDL2) and run its headless self-test so
      # editor regressions are caught. --selftest returns before any SDL/display
      # use, so it runs on the CI box with no GPU.
      - name: Build & self-test editor
        run: |
          cmake -S . -B build-editor -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DOKAY_BUILD_EDITOR=ON -DOKAY_BUILD_TESTS=OFF \
            -DOKAY_BUILD_SANDBOX=OFF -DOKAY_BUILD_LAUNCHER=ON
          cmake --build build-editor -j
          ./build-editor/bin/OkayEngine --selftest

  web-build:
    name: WebGL build (Emscripten)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pull in Emscripten. This runner has network, so Emscripten's SDL2 port is
      # fetched + cached here (the one online step the web build needs).
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51
          actions-cache-folder: emsdk-cache

      # Compile the player to WebAssembly/WebGL via the same script the editor's
      # "Build ▸ Web" export writes, so a broken web build fails CI (it silently
      # rotted before — the engine didn't even compile under Emscripten's Clang).
      - name: Build WebGL player
        run: bash scripts/build-web.sh

      - name: Verify wasm output
        run: |
          test -f build-web/web/okay-player.html
          test -f build-web/web/okay-player.wasm
          ls -la build-web/web/

      - name: Upload WebGL build
        uses: actions/upload-artifact@v4
        with:
          name: okayspace-webgl
          path: build-web/web/
