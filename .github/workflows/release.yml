name: Release Windows build

# Cross-compiles the Windows distribution (launcher, editor, player + SDL2.dll)
# from Linux with MinGW-w64 and publishes it as a GitHub Release. Triggers on a
# version tag, or on demand via "Run workflow" — the manual run tags + releases
# the version in dist/VERSION.txt.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write          # needed to attach assets to a Release

jobs:
  windows-exe:
    name: Cross-compile Windows exes (MinGW)
    runs-on: ubuntu-latest
    env:
      SDL2_VERSION: 2.30.9
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build mingw-w64 zip

      - name: Fetch SDL2 (MinGW dev)
        run: |
          curl -sSL -o sdl2-mingw.tar.gz \
            "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VERSION}/SDL2-devel-${SDL2_VERSION}-mingw.tar.gz"
          mkdir -p sdl2-mingw
          tar xzf sdl2-mingw.tar.gz -C sdl2-mingw --strip-components=1
          echo "SDL2_MINGW_PREFIX=$PWD/sdl2-mingw/x86_64-w64-mingw32" >> "$GITHUB_ENV"

      - name: Fetch libsodium (MinGW prebuilt)
        # Statically linked into the exes for authenticated packet encryption — no
        # extra DLL ships. If this step is removed, the build is simply unencrypted.
        run: |
          curl -sSL -o libsodium-mingw.tar.gz \
            "https://download.libsodium.org/libsodium/releases/libsodium-1.0.20-stable-mingw.tar.gz"
          mkdir -p libsodium-mingw
          tar xzf libsodium-mingw.tar.gz -C libsodium-mingw
          echo "OKAY_SODIUM_MINGW_PREFIX=$PWD/libsodium-mingw/libsodium-win64" >> "$GITHUB_ENV"

      - name: Build Windows distribution
        # Bake the account server into the binaries from repo secrets (if set),
        # so released builds are online by default with no key file shipped.
        # GitHub masks secret values in logs.
        env:
          OKAY_DEFAULT_ACCOUNT_URL: ${{ secrets.ACCOUNT_SERVER_URL }}
          OKAY_DEFAULT_ACCOUNT_KEY: ${{ secrets.ACCOUNT_API_KEY }}
        run: scripts/build-windows-dist.sh

      - name: Package zip
        id: pkg
        run: |
          VER=$(cat build-win-dist/VERSION.txt 2>/dev/null || echo dev)
          NAME="OkaySpace-windows-v${VER}"
          mkdir -p "$NAME"
          cp build-win-dist/* "$NAME"/
          zip -r "${NAME}.zip" "$NAME"
          echo "zip=${NAME}.zip" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: ${{ steps.pkg.outputs.zip }}

      # On a tag push, release that tag. On a manual run, create/refresh a
      # release for the version in dist/VERSION.txt (the runner's GITHUB_TOKEN
      # can push the tag).
      # Upload the zip AND the individual files as release assets. The in-app
      # updater (launcher + editor) downloads the individual files from
      # releases/latest/download/<name>, so they must be present as assets.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Upload the individual files the in-app updater fetches by name from
          # releases/latest/download/<name>. The launcher + its SDL2.dll sit at the
          # dist root; the editor/player live in Tools/. softprops uses each file's
          # basename as the asset name, so these resolve to the URLs the updater uses.
          files: |
            ${{ steps.pkg.outputs.zip }}
            build-win-dist/OkaySpace.exe
            build-win-dist/Tools/OkayEngine.exe
            build-win-dist/Tools/OkaySpacePlayer.exe
            build-win-dist/SDL2.dll
            build-win-dist/VERSION.txt
            dist/CHANGELOG.txt
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.pkg.outputs.ver) }}
          name: OkaySpace v${{ steps.pkg.outputs.ver }}
          generate_release_notes: true
